<div class="container mt-5">

    <h2 class="mb-4 text-center">Moj Profil</h2>

    <div class="profil-card mx-auto">

        <form id="profilForma">
            <div class="row">
                <!-- Ime i Prezime -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ime</label>
                    <input type="text"id="profilIme" class="form-control" value="Bojan" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Prezime</label>
                    <input type="text" id="profilPrezime" class="form-control" value="Spasić" required>
                </div>

                <!-- Korisničko ime -->
                <div class="col-12 mb-3">
                    <label class="form-label">Korisničko ime</label>
                    <input type="text" id="profilUsername" class="form-control" value="bojan_spasic" required>
                </div>

                <!-- Email -->
                <div class="col-12 mb-3">
                    <label class="form-label">Email adresa</label>
                    <input type="email" id="profilEmail" class="form-control" value="bojan.spasics@gmail.com" required>
                </div>

                <!-- Telefon -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefon</label>
                    <input type="tel" id="profilTelefon" class="form-control" value="064/123-4567">
                </div>

                <!-- Lokacija -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Lokacija (grad)</label>
                    <input type="text" id="profilGrad" class="form-control" value="Beograd" required>
                </div>

                <!-- Adresa -->
                <div class="col-12 mb-4">
                    <label class="form-label">Adresa</label>
                    <input type="text" id="profilAdresa" class="form-control" value="Ulica Kralja Petra 12, Voždovac">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3">
                Sačuvaj izmene
            </button>
        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
