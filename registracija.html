<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="registracija.css">
    <title>Registracija - MojMajstor</title>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- LOGO -->
        <a class="navbar-brand" href="index.html">
            <img src="Resources/MojMajstor logo finalni-09.png" alt="MojMajstor">
        </a>
    </div>
</nav>

<div class="container registracija-container mt-5">
    <div class="registracija-card mx-auto">

        <h2 class="text-center mb-5">Registracija</h2>

        <form id="registracijaForma">
            <!-- Korisničko ime -->
            <div class="mb-3">
                <label class="form-label">Korisničko ime</label>
                <input type="text" id="regUsername" class="form-control" placeholder="Unesite korisničko ime" required>
            </div>

            <!-- Lozinka -->
            <div class="mb-3">
                <label class="form-label">Lozinka</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Unesite lozinku" required>
            </div>

            <!-- Ponovi lozinku -->
            <div class="mb-4">
                <label class="form-label">Ponovi lozinku</label>
                <input type="password" id="regPassword2" class="form-control" placeholder="Ponovo unesite lozinku" required>
            </div>

            <!-- Izbor uloge -->
            <div class="mb-4">
                <label class="form-label">Registrujem se kao:</label>
                <div class="row g-3">
                    <div class="col-6">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="uloga" id="ulogaKorisnik" value="korisnik" checked>
                            <label class="form-check-label" for="ulogaKorisnik">
                                Korisnik
                            </label>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="uloga" id="ulogaMajstor" value="majstor">
                            <label class="form-check-label" for="ulogaMajstor">
                                Majstor
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">
                Registruj se
            </button>
        </form>

        <div class="text-center">
            <p class="mb-2">Već imate nalog?</p>
            <a href="login.html" class="btn btn-outline-light w-100">
                Prijavi se
            </a>
        </div>

    </div>

    <!-- LINK KA INDEX -->
    <div class="text-center mt-4">
        <a href="index.html" class="text-light text-decoration-none small">
            ← Nazad na početnu stranicu
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
