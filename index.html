<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="index.css">
    <title>MojMajstor - Pronađi majstora</title>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- LOGO -->
        <a class="navbar-brand" href="index.html">
            <img src="Resources/MojMajstor logo finalni-09.png" alt="MojMajstor">
        </a>

        <div class="d-flex align-items-center ms-auto gap-3">
            <a href="login.html" class="btn btn-outline-light">Prijavi se</a>
            <a href="registracija.html" class="btn btn-light">Registruj se</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="hero text-center py-5">
        <h1 class="display-5 fw-bold mb-3">Dobrodošli na MojMajstor</h1>
        <p class="lead mb-4">Pronađite pouzdanog majstora za vaš dom brzo i jednostavno</p>
    </div>

    <!-- LISTA USLUGA -->

    <div class="row mb-4 g-3 align-items-end">
    <div class="col-md-6">
        <label for="filterKategorija" class="form-label">Branša</label>
        <select id="filterKategorija" class="form-select">
            <option value="sve">Sve branše</option>
            <option value="Vodoinstalater">Vodoinstalater</option>
            <option value="Električar">Električar</option>
            <option value="Serviser bojlera">Serviser bojlera</option>
            <option value="Moler">Moler</option>
        </select>
    </div>

    <div class="col-md-6">
        <label for="sortOcena" class="form-label">Sortiranje po oceni</label>
        <select id="sortOcena" class="form-select">
            <option value="default">Bez sortiranja</option>
            <option value="desc">Ocena opadajuće</option>
            <option value="asc">Ocena rastuće</option>
        </select>
    </div>
</div>

    <!-- LISTA USLUGA -->

    <h2 class="text-center mb-4">Dostupne usluge</h2>
    <div id="servicesList" class="row g-4"></div>

    <div class="text-center mt-5">
        <p class="text-light">Da biste zakazali majstora ili kreirali zahtev, morate imati nalog.</p>
        <a href="registracija.html" class="btn btn-outline-light btn-lg px-5">
            Registruj se da bi koristio usluge
        </a>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
