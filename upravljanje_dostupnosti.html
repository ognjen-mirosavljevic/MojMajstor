<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="availability-container"> <!-- Glavni okvir stranice -->

                <h2>Upravljanje dostupnosti</h2> <!-- Naslov -->

                <p class="info">
                    Podesite periode kada ste zauzeti ili slobodni.
                </p>

                <!-- UNOS DATUMA OD -->
                <label>Datum od</label>
                <input type="date" class="form-control" required>

                <!-- UNOS DATUMA DO -->
                <label>Datum do</label>
                <input type="date" class="form-control" required>

                <!-- STATUS DOSTUPNOSTI -->
                <label>Status dostupnosti</label>
                <input type="text" class="form-control" placeholder="npr. zauzet / slobodan" required>

                <!-- DUGMAD -->
                <div class="buttons">
                    <button type="submit" class="btn btn-success">Potvrdi izmene</button>
                    <button type="reset" class="btn btn-danger">Odustani</button>
                </div>

                <!-- SIMULACIJA KALENDARA -->
                <div class="calendar">

                    <h3>Kalendar dostupnosti</h3>

                    <!-- LEGENDA -->
                    <div class="legend">
                        <span class="box free"></span> Slobodan
                        <span class="box busy"></span> Zauzet
                    </div>

                    <!-- GRID KALENDARA -->
                    <div class="grid">

                        <div class="day">1</div>
                        <div class="day busy">2</div>

                        <div class="day">29</div>
                        <div class="day">30</div>
