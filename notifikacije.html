<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Notifikacije</title>
    <link rel="stylesheet" href="notifikacije_css.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="back">←</div> <!-- izlaz iz sekcije -->

        <h2>Notifikacije</h2>

    </div>

    <!-- LISTA NOTIFIKACIJA -->
    <div class="notifications">

        <!-- NOTIFIKACIJA 1 -->
        <div class="notification new">
            <p><b>Novi zahtev</b></p>
            <p>Korisnik je poslao zahtev za zamenu slavine.</p>
        </div>

        <!-- NOTIFIKACIJA 2 -->
        <div class="notification">
            <p><b>Zahtev prihvaćen</b></p>
            <p>Majstor je prihvatio vaš zahtev.</p>
        </div>

        <!-- NOTIFIKACIJA 3 -->
        <div class="notification">
            <p><b>Zahtev odbijen</b></p>
            <p>Majstor je odbio vaš zahtev.</p>
        </div>

        <!-- NOTIFIKACIJA 4 -->
        <div class="notification new">
            <p><b>Novo obaveštenje</b></p>
            <p>Imate novu poruku u chatu.</p>
        </div>

    </div>

</div>

</body>
</html>
