<!-- SADRŽAJ -->
<div class="container mt-5">

    <h2 class="mb-2 text-center">Pregled korisnika</h2>

    <div class="profil-card mx-auto">

        <form>

            <div class="row">
                <!-- Ime i Prezime -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ime</label>
                    <input type="text" class="form-control" value="Darko">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Prezime</label>
                    <input type="text" class="form-control" value="Lazić">
                </div>

                <!-- Username -->
                <div class="col-12 mb-3">
                    <label class="form-label">Korisničko ime</label>
                    <input type="text" class="form-control" value="darkolazicofficial">
                </div>

                <!-- Email -->
                <div class="col-12 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" value="darkolazicofficial@gmail.com">
                </div>

                <!-- Telefon -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefon</label>
                    <input type="tel" class="form-control" value="064/759-9999">
                </div>

                <!-- Lokacija -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Lokacija</label>
                    <input type="text" class="form-control" value="Beograd">
                </div>

                <!-- Adresa -->
                <div class="col-12 mb-3">
                    <label class="form-label">Adresa</label>
                    <input type="text" class="form-control" value="Ulica Kralja Petra 12">
                </div>

                <!-- STATUS -->
                <div class="col-12 mb-3">
                    <label class="form-label">Status korisnika</label>
                    <select class="form-select">
                        <option selected>Aktivan</option>
                        <option>Blokiran</option>
                    </select>
                </div>

                <!-- RAZLOG -->
                <div class="col-12 mb-4">
                    <label class="form-label">Razlog izmene / blokiranja</label>
                    <textarea class="form-control" rows="3" placeholder="Unesite razlog..."></textarea>
                </div>
            </div>

            <!-- DUGMAD -->
            <div class="d-flex gap-3">

                <button type="button" class="btn btn-primary w-100 py-3">
                    Sačuvaj izmene
                </button>

                <button type="button" class="btn btn-danger w-100 py-3">
                    Blokiraj korisnika
                </button>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
