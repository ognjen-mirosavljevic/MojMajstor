<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Chat komunikacija</title>
    <link rel="stylesheet" href="komunikacija_sa_korisnikom_css.css">
</head>

<body>

<div class="chat-container">

    <!-- HEADER CHATA -->
    <div class="chat-header">

        <!-- Strelica za izlazak (simbolično) -->
        <div class="back">←</div>

        <div class="chat-user">
            <h3>Korisnik: Marko Marković</h3>
            <p>Status: aktivan</p>
        </div>

    </div>

    <!-- PORUKE -->
    <div class="chat-box">

        <div class="message user">
            Zdravo, kada možete da dođete?
        </div>

        <div class="message master">
            Mogu sutra ujutru oko 10h.
        </div>

        <div class="message user">
            Odlično, važi.
        </div>

    </div>

    <!-- INPUT ZA SLANJE PORUKE -->
    <div class="chat-input">

        <input type="text" placeholder="Unesite poruku...">

        <button>Pošalji</button>

    </div>

</div>

</body>
</html>
