<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravljanje profilom</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="upravljanje_profilom_css.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="Resources/MojMajstor logo finalni-09.png" alt="MojMajstor logo">
            </a>

            <div class="d-flex align-items-center ms-auto gap-3">

                <div class="dropdown">
                    <div class="position-relative" data-bs-toggle="dropdown" style="cursor: pointer;">
                        <i class="bi bi-bell-fill fs-5 text-white"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            3
                        </span>
                    </div>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a href="inbox.html" class="dropdown-item">Nova poruka</a></li>
                    </ul>
                </div>

                <div class="dropdown">
                    <button class="btn btn-link text-white text-decoration-none dropdown-toggle p-0 border-0 shadow-none"
                            type="button"
                            id="userDropdown"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <span id="userName">Korisnik</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="upravljanje_profilom.html">Profil</a></li>
                        <li><a class="dropdown-item" href="index.html">Glavna stranica</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#">Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="profile-card">
                    <h2 class="text-center mb-4">Upravljanje profilom</h2>

                    <form>
                        <div class="mb-3">
                            <label for="imePrezime" class="form-label">Ime i prezime</label>
                            <input type="text" id="imePrezime" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="opisUsluga" class="form-label">Opis usluga</label>
                            <textarea id="opisUsluga" class="form-control" rows="4" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="lokacija" class="form-label">Lokacija</label>
                            <input type="text" id="lokacija" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="kategorija" class="form-label">Kategorija</label>
                            <select id="kategorija" class="form-select">
                                <option>Vodoinstalater</option>
                                <option>Električar</option>
                                <option>Stolar</option>
                                <option>Molerski radovi</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="datumPocetka" class="form-label">Datum početka rada</label>
                            <input type="date" id="datumPocetka" class="form-control" required>
                        </div>

                        <div class="d-flex justify-content-between gap-2 flex-wrap">
                            <button type="submit" class="btn btn-success px-4">Sačuvaj</button>
                            <button type="reset" class="btn btn-danger px-4">Odustani</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
