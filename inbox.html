<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Inbox</title>
    <link rel="stylesheet" href="inbox_css.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="back">←</div>

        <h2>Inbox</h2>

    </div>

    <!-- LISTA CHATOVA -->
    <div class="inbox">

        <!-- NEPROČITANO -->
        <div class="chat-item unread active">

            <div class="avatar">M</div>

            <div class="chat-info">
                <div class="top">
                    <b>Marko Marković</b>
                    <span class="time">10:32</span>
                </div>
                <p>Prihvatam posao, možemo se dogovoriti...</p>
            </div>

        </div>

        <!-- NEPROČITANO -->
        <div class="chat-item unread">

            <div class="avatar">A</div>

            <div class="chat-info">
                <div class="top">
                    <b>Ana Jovanović</b>
                    <span class="time">09:15</span>
                </div>
                <p>Da li možete sutra da dođete?</p>
            </div>

        </div>

        <!-- PROČITANO -->
        <div class="chat-item">

            <div class="avatar">P</div>

            <div class="chat-info">
                <div class="top">
                    <b>Petar Petrović</b>
                    <span class="time">Juče</span>
                </div>
                <p>Hvala na obavljenom poslu!</p>
            </div>

        </div>

        <!-- NEPROČITANO -->
        <div class="chat-item unread">

            <div class="avatar">N</div>

            <div class="chat-info">
                <div class="top">
                    <b>Novi zahtev</b>
                    <span class="time">Novo</span>
                </div>
                <p>Imate novi zahtev od korisnika.</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
