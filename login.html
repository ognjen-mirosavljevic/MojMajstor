<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="login.css">
    <title>Prijavi se - MojMajstor</title>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <!-- LOGO -->
        <a class="navbar-brand" href="index.html">
            <img src="Resources/MojMajstor logo finalni-09.png" alt="MojMajstor">
        </a>
    </div>
</nav>

<div class="container login-container mt-5">
    <div class="login-card mx-auto">
        
        <h2 class="text-center mb-4">Prijavi se</h2>

        <form id="loginForma">
            <div class="mb-3">
                <label class="form-label">Korisničko ime</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Unesite korisničko ime" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Lozinka</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Unesite lozinku" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                Prijavi se
            </button>
        </form>

        <hr class="my-4 border-light">

        <div class="text-center">
            <p class="mb-2">Nemate nalog?</p>
            <a href="registracija.html" class="btn btn-outline-light w-100">
                Kreirajte nalog
            </a>
        </div>

    </div>

    <!-- NAZAD NA INDEX -->
    <div class="text-center mt-4">
        <a href="index.html" class="text-light text-decoration-none small">
            ← Nastavi kao gost
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
